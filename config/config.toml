[cli]
installer = "internal"

[models]
default = "zai-glm-5.1"

[model.zai-glm-5.1]
model = "glm-5.1"
base_url = "https://api.z.ai/api/coding/paas/v4"
name = "z.ai GLM-5.1"
description = "z.ai GLM-5.1 model — general coding and complex tasks"
api_key = "your-zai-api-key-here"
temperature = 0.7
top_p = 0.95
max_completion_tokens = 8192
context_window = 128000

